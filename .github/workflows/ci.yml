name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

# Cancel previous runs on the same PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Minimal permissions by default
permissions:
  contents: read

env:
  CHEF_LICENSE: accept-no-persist

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
    - name: Set up Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.2'
        bundler-cache: true
    - name: Check Ruby syntax
      run: find . -name "*.rb" -not -path "./vendor/*" -exec ruby -c -w {} \;
    - name: Check Chef syntax with Cookstyle
      run: bundle exec cookstyle --fail-level error
    - name: Run ChefSpec tests with coverage
      run: bundle exec rspec --format documentation --format RspecJunitFormatter --out rspec.xml
    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
      with:
        name: rspec-results
        path: rspec.xml
    - name: Upload coverage results
      if: always()
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
      with:
        name: coverage-results
        path: coverage/

  agent-integration:
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 60
    strategy:
      matrix:
        os: [ubuntu-2004, ubuntu-2204, ubuntu-2404, debian-11, debian-12, rockylinux-8, rockylinux-9, almalinux-9, amazonlinux-2023]
      fail-fast: false
    env:
      CHEF_LICENSE: accept-no-persist
      KITCHEN_YAML: kitchen.yml
      DOCKER_MEMORY: "2048m"
      DOCKER_CPUS: "2"
    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
    - name: Set up Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.2'
        bundler-cache: true
    - name: Set up Docker
      uses: docker/setup-buildx-action@v3
    - name: Free disk space
      run: |
        sudo apt-get clean
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /opt/ghc
        sudo rm -rf /usr/local/share/boost
    - name: Install Policyfile dependencies
      run: bundle exec chef-cli install test/policyfiles/agent.rb
    - name: Test Kitchen - Agent
      run: |
        bundle exec kitchen test agent-${{ matrix.os }} --destroy=always
    - name: Upload kitchen logs on failure
      if: failure()
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
      with:
        name: kitchen-logs-agent-${{ matrix.os }}
        path: .kitchen/logs/

  server-postgresql-integration:
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 60
    strategy:
      matrix:
        os: [ubuntu-2004, ubuntu-2204, debian-11, rockylinux-8, amazonlinux-2023]
      fail-fast: false
    env:
      CHEF_LICENSE: accept-no-persist
      KITCHEN_YAML: kitchen.yml
      DOCKER_MEMORY: "3072m"
      DOCKER_CPUS: "2"
    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
    - name: Set up Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.2'
        bundler-cache: true
    - name: Set up Docker
      uses: docker/setup-buildx-action@v3
    - name: Free disk space
      run: |
        sudo apt-get clean
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /opt/ghc
        sudo rm -rf /usr/local/share/boost
    - name: Install Policyfile dependencies
      run: bundle exec chef-cli install test/policyfiles/server.rb
    - name: Test Kitchen - PostgreSQL
      run: |
        bundle exec kitchen test server-postgresql-${{ matrix.os }} --destroy=always
    - name: Upload kitchen logs on failure
      if: failure()
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
      with:
        name: kitchen-logs-postgresql-${{ matrix.os }}
        path: .kitchen/logs/

  server-mysql-integration:
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 60
    strategy:
      matrix:
        os: [ubuntu-2004, ubuntu-2204, debian-11, rockylinux-8, amazonlinux-2023]
      fail-fast: false
    env:
      CHEF_LICENSE: accept-no-persist
      KITCHEN_YAML: kitchen.yml
      DOCKER_MEMORY: "3072m"
      DOCKER_CPUS: "2"
    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
    - name: Set up Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.2'
        bundler-cache: true
    - name: Set up Docker
      uses: docker/setup-buildx-action@v3
    - name: Free disk space
      run: |
        sudo apt-get clean
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /opt/ghc
        sudo rm -rf /usr/local/share/boost
    - name: Install Policyfile dependencies
      run: bundle exec chef-cli install test/policyfiles/server.rb
    - name: Test Kitchen - MySQL
      run: |
        bundle exec kitchen test server-mysql-${{ matrix.os }} --destroy=always
    - name: Upload kitchen logs on failure
      if: failure()
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
      with:
        name: kitchen-logs-mysql-${{ matrix.os }}
        path: .kitchen/logs/